<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автомойка Химиков 60 — Нефтяники</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            color: #fff;
            background: #0a0a0a;
            overflow-x: hidden;
        }
        
        /* Фон с повышенной затемнённостью */
        .hero {
            height: 100vh;
            min-height: 650px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
                        url('https://img.magnific.com/premium-photo/black-car-with-hood-up-word-snow-it_221812-1221.jpg?semt=ais_hybrid&w=740&q=80') center/cover no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        
        .header-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.92);
            padding: 14px 28px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 22px;
            font-size: 15px;
            z-index: 10;
            max-width: 95%;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .logo-circle {
            width: 98px; /* Увеличен ещё на 30% */
            height: 98px;
            background: #000;
            border: 5px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            line-height: 1.05;
            text-align: center;
            flex-shrink: 0;
        }
        
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.85rem;
            line-height: 1.05;
            margin: 35px 0 45px;
            text-shadow: 0 5px 30px rgba(0,0,0,0.9);
        }
        
        .btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 17px 42px;
            border-radius: 50px;
            font-weight: 500;
            text-decoration: none;
            margin: 12px;
            transition: all 0.3s;
            font-size: 1.15rem;
        }
        .btn:hover {
            transform: scale(1.06);
            background: #eee;
        }
        
        .services {
            padding: 70px 20px;
            background: #111;
            text-align: center;
        }
        
        .video-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 22px;
            justify-content: center;
            padding: 45px 20px;
            background: #0a0a0a;
        }
        
        .video-card {
            width: 100%;
            max-width: 350px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .video-card:hover { transform: translateY(-12px); }
        
        .video-thumb {
            height: 220px;
            background: #333 center/cover;
            position: relative;
        }
        .video-thumb::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 58px;
            color: rgba(255,255,255,0.85);
        }
